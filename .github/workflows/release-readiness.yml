name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Readiness mode"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - one-zero
      include_reliability:
        description: "Run repeated load/chaos + redis integration gates"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Release verification
        id: run_release_verify
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          pnpm verify:release > .artifacts/error.log 2>&1
      - name: npm publish dry-run (no git checks)
        id: run_publish_dry_run
        if: steps.run_release_verify.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          pnpm -r publish --dry-run --no-git-checks > .artifacts/error.log 2>&1
        env:
          CHANGESETS_RELEASE: "1"
      - name: Write failure digest
        if: steps.run_release_verify.outcome == 'failure' || steps.run_publish_dry_run.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### verify"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v7
        if: steps.run_release_verify.outcome == 'failure' || steps.run_publish_dry_run.outcome == 'failure'
        with:
          name: release-readiness-verify
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_release_verify.outcome == 'failure' || steps.run_publish_dry_run.outcome == 'failure'
        run: exit 1

  reliability:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_reliability == 'true' }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Repeat load and chaos checks
        id: run_reliability
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          (
            for run in 1 2 3; do
              echo "Release-readiness reliability repetition #${run}: load"
              pnpm test:load
              echo "Release-readiness reliability repetition #${run}: chaos"
              pnpm test:chaos
            done
            pnpm test:integration
          ) > .artifacts/error.log 2>&1
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - name: Write failure digest
        if: steps.run_reliability.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### reliability"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v7
        if: steps.run_reliability.outcome == 'failure'
        with:
          name: release-readiness-reliability
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_reliability.outcome == 'failure'
        run: exit 1

  summary:
    runs-on: ubuntu-latest
    needs:
      - verify
      - reliability
    if: always()
    steps:
      - name: Download failure digests
        uses: actions/download-artifact@v6
        if: always()
        continue-on-error: true
        with:
          path: .artifacts-upload
          pattern: release-readiness-*
          merge-multiple: true
      - name: Readiness summary
        run: |
          set -euo pipefail
          VERIFY_RESULT="${{ needs.verify.result }}"
          RELIABILITY_RESULT="${{ needs.reliability.result }}"
          if [ "${RELIABILITY_RESULT}" = "skipped" ] || [ -z "${RELIABILITY_RESULT}" ]; then
            RELIABILITY_RESULT="not_requested"
          fi

          if [ "${VERIFY_RESULT}" = "success" ] && { [ "${RELIABILITY_RESULT}" = "success" ] || [ "${RELIABILITY_RESULT}" = "not_requested" ]; }; then
            DECISION="GO"
          else
            DECISION="NO-GO"
          fi

          {
            echo "## Release Readiness Summary"
            echo ""
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| verify + dry-run publish | ${VERIFY_RESULT} |"
            echo "| optional reliability gates | ${RELIABILITY_RESULT} |"
            echo ""
            echo "## Failure details"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          FOUND=0
          if [ -d .artifacts-upload ]; then
            while IFS= read -r file; do
              FOUND=1
              cat "$file" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            done < <(find .artifacts-upload -name 'failure-summary.md' | sort)
          fi

          if [ "$FOUND" -eq 0 ]; then
            {
              echo "No failure digests were collected."
              echo ""
              echo "A gate failed before its digest was uploaded, or no digest artifact matched the download pattern."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo "**Decision: ${DECISION}**"
            echo ""
            echo "If decision is GO, baseline release gates are satisfied."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${DECISION}" = "NO-GO" ]; then
            exit 1
          fi

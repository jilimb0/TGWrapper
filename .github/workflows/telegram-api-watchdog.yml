name: Telegram API Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  baseline-watchdog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check Telegram API changelog drift
        id: baseline_check
        continue-on-error: true
        run: pnpm telegram:baseline:latest
      - name: Sync baseline to latest changelog version
        if: steps.baseline_check.outcome == 'failure'
        run: pnpm telegram:baseline:sync
      - name: Create or update tracking issue
        if: steps.baseline_check.outcome == 'failure'
        id: baseline_issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Telegram Bot API baseline upgrade follow-up';
            const body = [
              'Automated issue from Telegram API watchdog.',
              '',
              'A newer Telegram Bot API version was detected and baseline was synced automatically.',
              '',
              '## Required follow-up',
              '- [ ] update `/Users/jilimbo/Documents/Personal/TGWrapper/src/types/telegram.ts`',
              '- [ ] update `/Users/jilimbo/Documents/Personal/TGWrapper/test/types/telegram-api-compat.typecheck.ts`',
              '- [ ] update `/Users/jilimbo/Documents/Personal/TGWrapper/test/telegram-api-compat.contract.test.ts`',
              '- [ ] update `/Users/jilimbo/Documents/Personal/TGWrapper/test/context.compat.test.ts` and runtime fallback tests',
              '- [ ] update `/Users/jilimbo/Documents/Personal/TGWrapper/docs/TELEGRAM_API_COMPATIBILITY.md`',
              '- [ ] run `pnpm verify:release`'
            ].join('\n');

            const labels = ['telegram-api', 'compat', 'release-blocker'];

            for (const name of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: name === 'release-blocker' ? 'b60205' : '1d76db',
                  description: 'Automatically managed by Telegram API watchdog'
                });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100
            });

            const found = existing.find((issue) => issue.title === title && !issue.pull_request);
            if (found) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: found.number,
                body
              });
              core.setOutput('issue_number', String(found.number));
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels
            });
            core.setOutput('issue_number', String(created.data.number));
      - name: Create PR for baseline sync
        if: steps.baseline_check.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(telegram): sync Bot API baseline"
          branch: "chore/telegram-baseline-sync"
          delete-branch: true
          title: "chore(telegram): sync Bot API baseline"
          body: |
            Automated update from Telegram API watchdog.

            ## What changed
            - synced `docs/telegram-api-baseline.json` to the latest Bot API version from changelog

            ## Follow-up required before release
            - [ ] update `/Users/jilimbo/Documents/Personal/TGWrapper/src/types/telegram.ts` for new Bot API entities
            - [ ] update compatibility tests (`test/types/telegram-api-compat.typecheck.ts`, contract/runtime tests)
            - [ ] update `/Users/jilimbo/Documents/Personal/TGWrapper/docs/TELEGRAM_API_COMPATIBILITY.md` if behavior changed
            - [ ] run `pnpm verify:release`

            Closes #${{ steps.baseline_issue.outputs.issue_number }}
          labels: |
            dependencies
            documentation

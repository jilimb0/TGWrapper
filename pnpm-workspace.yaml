packages:
  - '.'
  - 'packages/*'
  - 'examples/*'

overrides:
  vite: 8.0.16
  'undici@^6': 6.27.0
  'undici@^7': 7.28.0
  'ws@^8': 8.21.0
  read-yaml-file: 2.1.0
  'js-yaml@^4': 4.3.0
  'markdown-it@^14': 14.2.0
  esbuild: 0.28.1
  'linkify-it@^5': 5.0.1
  'brace-expansion@^5': 5.0.6

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@tgwrapper/core'
  - '@tgwrapper/adapter-redis'
  - '@tgwrapper/observability'
  - '@tgwrapper/starter-migration'
  - '@tgwrapper/starter-standard-bot'
  - '@tgwrapper/starter-support-bot'
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  serverless: true
  sharp: true
  workerd: true

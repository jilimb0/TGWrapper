name: Go No-Go

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'v*'
      - "v*"

permissions:
  contents: read

concurrency:
  group: go-no-go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gates:
    runs-on: ubuntu-latest
    env:
      NPM_PUBLISH_PROVENANCE: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Upgrade npm for trusted publishing parity
        run: |
          npm i -g npm@11.8.0
          npm -v
      - run: pnpm install --frozen-lockfile
      - name: Release gates
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          rm -f .artifacts/failure-summary.md .artifacts/error.log || true
          if ! (
            if [ "${NPM_PUBLISH_PROVENANCE}" = "true" ]; then
              echo "Unsupported publish mode for private repository: provenance=true."
              echo "Use NPM_PUBLISH_PROVENANCE=false or migrate to supported public provenance flow."
              exit 1
            fi
            pnpm verify:release
            CHANGESETS_RELEASE="1" pnpm -r publish --dry-run --no-git-checks
          ) > .artifacts/error.log 2>&1; then
            {
              echo "### release-gates"
              echo ""
              echo '```text'
              tail -n 120 .artifacts/error.log
              echo '```'
            } > .artifacts/failure-summary.md
            exit 1
          fi
      - name: Persist failure digest artifact
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          if [ ! -f .artifacts/failure-summary.md ]; then
            {
              echo "### failure-digest-fallback"
              echo ""
              echo "The job failed before a dedicated failure summary was written."
              echo ""
              echo '```text'
              if [ -f .artifacts/error.log ]; then
                tail -n 120 .artifacts/error.log
              else
                echo "No .artifacts/error.log file was found."
              fi
              echo '```'
            } > .artifacts/failure-summary.md
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-no-go-release-gates
          path: .artifacts
          if-no-files-found: ignore

  reliability-gates:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Reliability gates
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          rm -f .artifacts/failure-summary.md .artifacts/error.log || true
          if ! (
            for run in 1 2 3; do
              echo "Go/No-Go reliability repetition #${run}: load"
              pnpm test:load
              echo "Go/No-Go reliability repetition #${run}: chaos"
              pnpm test:chaos
            done
            pnpm test:integration
          ) > .artifacts/error.log 2>&1; then
            {
              echo "### reliability-gates"
              echo ""
              echo '```text'
              tail -n 120 .artifacts/error.log
              echo '```'
            } > .artifacts/failure-summary.md
            exit 1
          fi
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - name: Persist failure digest artifact
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          if [ ! -f .artifacts/failure-summary.md ]; then
            {
              echo "### failure-digest-fallback"
              echo ""
              echo "The job failed before a dedicated failure summary was written."
              echo ""
              echo '```text'
              if [ -f .artifacts/error.log ]; then
                tail -n 120 .artifacts/error.log
              else
                echo "No .artifacts/error.log file was found."
              fi
              echo '```'
            } > .artifacts/failure-summary.md
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-no-go-reliability-gates
          path: .artifacts
          if-no-files-found: ignore

  go-no-go-summary:
    runs-on: ubuntu-latest
    needs:
      - release-gates
      - reliability-gates
    if: always()
    steps:
      - name: Prepare artifact download directory
        if: always()
        run: rm -rf .artifacts-upload && mkdir -p .artifacts-upload
      - uses: actions/download-artifact@v6
        if: always()
        with:
          path: .artifacts-upload
          pattern: go-no-go-*
          merge-multiple: true
      - name: Publish decision
        run: |
          set -euo pipefail
          RELEASE_GATES_RESULT="${{ needs.release-gates.result }}"
          RELIABILITY_GATES_RESULT="${{ needs.reliability-gates.result }}"

          if [ "${RELEASE_GATES_RESULT}" = "success" ] && [ "${RELIABILITY_GATES_RESULT}" = "success" ]; then
            DECISION="GO"
            MESSAGE="All release gates passed."
          else
            DECISION="NO-GO"
            MESSAGE="One or more release gates failed. Do not tag/publish."
          fi

          {
            echo "## Go/No-Go Decision"
            echo ""
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| release-gates | ${RELEASE_GATES_RESULT} |"
            echo "| reliability-gates | ${RELIABILITY_GATES_RESULT} |"
            echo ""
            echo "## Failure digest"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          FILE_LIST=$(find .artifacts-upload -maxdepth 3 -type f | sort || true)

          {
            echo "### Downloaded artifact files"
            echo ""
            echo '```text'
            if [ -n "$FILE_LIST" ]; then
              printf '%s\n' "$FILE_LIST"
            else
              echo "No files were downloaded into .artifacts-upload."
            fi
            echo '```'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if find .artifacts-upload -name 'failure-summary.md' -print -quit >/dev/null 2>&1; then
            while IFS= read -r file; do
              cat "$file" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            done < <(find .artifacts-upload -name 'failure-summary.md' | sort)
          else
            {
              echo "### Failure digest unavailable"
              echo ""
              echo "No failure-summary.md files were found in downloaded artifacts."
              echo "This indicates either artifact upload did not include the digest or the failing job never reached digest creation."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "Target ref: \`${GITHUB_REF}\`"
            echo ""
            echo "**Decision: ${DECISION}**"
            echo ""
            echo "${MESSAGE}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${DECISION}" = "NO-GO" ]; then
            exit 1
          fi

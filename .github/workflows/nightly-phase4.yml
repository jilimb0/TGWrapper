name: Nightly Phase4

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-phase4
  cancel-in-progress: true

jobs:
  nightly-chaos-load:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm -r typecheck
      - run: pnpm build
      - run: pnpm -r build
      - name: Repeat load/chaos tests to catch flakes
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          for run in 1 2 3; do
            echo "Nightly repetition #${run}: load"
            pnpm test:load | tee -a .artifacts/nightly-reliability.log
            echo "Nightly repetition #${run}: chaos"
            pnpm test:chaos | tee -a .artifacts/nightly-reliability.log
          done
      - run: pnpm test:integration
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - run: pnpm benchmark
      - run: pnpm benchmark:trend
        env:
          BENCHMARK_MIN_RATIO: "0.55"
          BENCHMARK_MIN_UPS: "180000"
      - name: Nightly summary
        if: always()
        run: |
          {
            echo "## Nightly Phase4 Summary"
            echo ""
            echo "- typecheck and build completed"
            echo "- repeated load/chaos checks completed"
            echo "- redis integration completed"
            echo "- benchmark + trend completed"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always() && (hashFiles('benchmark/reports/latest.json') != '' || hashFiles('benchmark/reports/baseline.json') != '' || hashFiles('.artifacts/nightly-reliability.log') != '')
        with:
          name: phase4-benchmark-report
          path: |
            benchmark/reports/latest.json
            benchmark/reports/baseline.json
            .artifacts/nightly-reliability.log
          if-no-files-found: error

name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    concurrency:
      group: release-${{ github.event_name }}-${{ github.event.workflow_run.head_branch || github.ref }}
      cancel-in-progress: false
    env:
      NPM_PUBLISH_PROVENANCE: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Upgrade npm for trusted publishing
        run: |
          npm i -g npm@11.8.0
          npm -v
      - name: Tooling versions
        run: |
          node -v
          npm -v
          pnpm -v
          echo "registry=$(npm config get registry)"
          echo "always-auth=$(npm config get always-auth || true)"
      # Release job always uses --no-frozen-lockfile:
      # changesets/action updates package.json versions before pnpm install runs,
      # so the lockfile is intentionally out of date at this point in the flow.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm verify:release
      - run: pnpm telegram:schema:fetch:ci
      - run: pnpm telegram:schema:completeness:check
      - run: pnpm telegram:schema:drift:report
      - run: pnpm telegram:schema:release:gate
      - run: pnpm benchmark
      - run: pnpm benchmark:trend
        env:
          BENCHMARK_MIN_RATIO: "0.55"
          BENCHMARK_MIN_UPS: "180000"
      - name: Release status (informational)
        continue-on-error: true
        run: pnpm release:status || echo "Release status check reported missing changeset (informational)."
      - name: Package metadata snapshot
        run: |
          mkdir -p .artifacts
          node -e "const fs=require('fs');const pkgs=['package.json','packages/adapter-redis/package.json','packages/observability/package.json'];const out=[];for(const p of pkgs){const v=JSON.parse(fs.readFileSync(p,'utf8'));out.push({file:p,name:v.name,version:v.version,files:v.files,exports:v.exports,publishConfig:v.publishConfig});}fs.writeFileSync('.artifacts/package-metadata.json', JSON.stringify(out,null,2));console.log(JSON.stringify(out,null,2));"
      - name: NPM registry visibility
        continue-on-error: true
        run: |
          set -euxo pipefail
          mkdir -p .artifacts
          {
            npm view @tgwrapper/core --json || true
            npm view @tgwrapper/adapter-redis --json || true
            npm view @tgwrapper/observability --json || true
          } > .artifacts/npm-registry-visibility.jsonl
      - name: Pack artifact check
        run: |
          set -euo pipefail
          mkdir -p .artifacts/pack
          for d in "." "packages/adapter-redis" "packages/observability"; do
            name="$(basename "$d")"
            [ "$d" = "." ] && name="root"
            echo "Checking pack contents in ${d}"
            (cd "${d}" && npm pack --dry-run --json > /tmp/pack.json)
            cp /tmp/pack.json ".artifacts/pack/${name}.json"
            node -e "const fs=require('fs');const pack=JSON.parse(fs.readFileSync('/tmp/pack.json','utf8'))[0];const files=new Set(pack.files.map(f=>f.path));const pkg=JSON.parse(fs.readFileSync('${d}/package.json','utf8'));const required=['package.json','dist/index.js','dist/index.d.ts'];for(const f of required){if(!files.has(f)){console.error('Missing packed file',f,'for',pkg.name);process.exit(1);}}console.log('Pack OK',pkg.name,pkg.version,'files=',pack.files.length);"
          done
      - run: |
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL}"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          echo "OIDC context is available"
      - name: OIDC debug claims
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          RAW="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"
          JWT="$(echo "${RAW}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>process.stdout.write(JSON.parse(s).value))")"
          echo "${JWT}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const token=s.trim();const parts=token.split('.');if(parts.length<2){throw new Error('Invalid JWT');}const payload=JSON.parse(Buffer.from(parts[1],'base64url').toString('utf8'));const out={iss:payload.iss,aud:payload.aud,sub:payload.sub,repository:payload.repository,repository_owner:payload.repository_owner,ref:payload.ref,job_workflow_ref:payload.job_workflow_ref,workflow_ref:payload.workflow_ref,actor:payload.actor};require('fs').writeFileSync('.artifacts/oidc-claims.json', JSON.stringify(out,null,2));console.log(JSON.stringify(out,null,2));})"
      - name: Assert supported npm publish mode
        run: |
          set -euo pipefail
          if [ "${NPM_PUBLISH_PROVENANCE}" = "true" ]; then
            echo "Unsupported publish configuration for current repository visibility:"
            echo "NPM_PUBLISH_PROVENANCE=true with private GitHub repository."
            echo "Set NPM_PUBLISH_PROVENANCE=false (current supported mode) or migrate repository/package settings to supported public provenance flow."
            exit 1
          fi
          echo "Publish mode OK: private repository without provenance."
      - name: OIDC publish preflight (dry-run)
        env:
          CHANGESETS_RELEASE: "1"
        run: |
          set -euo pipefail
          for d in "." "packages/adapter-redis" "packages/observability"; do
            NAME="$(node -e "console.log(require('./${d}/package.json').name)")"
            VERSION="$(node -e "console.log(require('./${d}/package.json').version)")"
            if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skipping preflight for already published ${NAME}@${VERSION}"
              continue
            fi
            echo "OIDC dry-run publish in ${d} for ${NAME}@${VERSION}"
            (cd "${d}" && npm publish --access public --dry-run)
          done
      - name: Release summary
        if: always()
        run: |
          {
            echo "## Release Pipeline Summary"
            echo ""
            echo "- verify:release completed"
            echo "- Telegram schema checks completed"
            echo "- benchmark + trend checks completed"
            echo "- pack artifact verification completed"
            echo "- OIDC preflight completed"
            echo ""
            echo "Artifacts: package metadata, npm visibility, pack manifests, OIDC claims."
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-diagnostics
          path: .artifacts
          if-no-files-found: ignore

      # changesets/action handles two modes automatically:
      #   1. Pending changesets exist → creates/updates version PR
      #   2. No pending changesets    → publishes any unpublished packages
      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm -r publish --access public --no-git-checks
          version: bash scripts/changeset-version.sh
        env:
          CHANGESETS_RELEASE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Confirm all package versions are reachable on npm before syncing examples.
      # changesets/action may return published=false even on a successful publish
      # (e.g. when re-running after a partial failure). This step is the
      # authoritative source of truth: it polls npm with retries and sets
      # all_published=true only when every local version is confirmed live.
      - name: Confirm packages live on npm
        id: npm_confirm
        if: always()
        run: |
          set -euo pipefail
          ALL_PUBLISHED=true
          for d in "." "packages/adapter-redis" "packages/observability"; do
            NAME="$(node -e "console.log(require('./${d}/package.json').name)")"
            VERSION="$(node -e "console.log(require('./${d}/package.json').version)")"
            FOUND=false
            for i in 1 2 3 4 5; do
              REMOTE="$(npm view "${NAME}@${VERSION}" version 2>/dev/null || true)"
              if [ "${REMOTE}" = "${VERSION}" ]; then
                echo "✓ ${NAME}@${VERSION} confirmed on npm"
                FOUND=true
                break
              fi
              echo "Attempt ${i}: ${NAME}@${VERSION} not yet visible, retrying in 10s..."
              sleep 10
            done
            if [ "${FOUND}" = "false" ]; then
              echo "✗ ${NAME}@${VERSION} NOT found on npm after retries"
              ALL_PUBLISHED=false
            fi
          done
          echo "all_published=${ALL_PUBLISHED}" >> "$GITHUB_OUTPUT"

      - name: Sync example deps post-publish
        if: steps.npm_confirm.outputs.all_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/sync-examples.mjs
          pnpm install --no-frozen-lockfile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/*/package.json pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "No changes to sync, skipping PR."
            exit 0
          fi
          BRANCH="chore/sync-examples-$(date +%Y%m%d%H%M%S)"
          git checkout -b "${BRANCH}"
          git commit -m "chore: sync example deps after release"
          git push origin "${BRANCH}"
          gh pr create \
            --title "chore: sync example deps after release" \
            --body "Automated PR: updates examples to latest published @tgwrapper/* versions and regenerates lockfile." \
            --base main \
            --head "${BRANCH}"

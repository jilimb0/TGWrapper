name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    env:
      # Repository is private; npm provenance is currently unsupported for this source visibility.
      NPM_PUBLISH_PROVENANCE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Upgrade npm for trusted publishing
        run: |
          npm i -g npm@11.8.0
          npm -v
      - name: Tooling versions
        run: |
          node -v
          npm -v
          pnpm -v
          echo "registry=$(npm config get registry)"
          echo "always-auth=$(npm config get always-auth || true)"
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:release
      - name: Release status
        run: pnpm release:status
      - name: Package metadata snapshot
        run: |
          node -e "const fs=require('fs');const pkgs=['package.json','packages/adapter-redis/package.json','packages/observability/package.json'];for(const p of pkgs){const v=JSON.parse(fs.readFileSync(p,'utf8'));console.log(JSON.stringify({file:p,name:v.name,version:v.version,files:v.files,exports:v.exports,publishConfig:v.publishConfig},null,2));}"
      - name: NPM registry visibility
        continue-on-error: true
        run: |
          set -euxo pipefail
          npm view @jilimb0/tgwrapper --json || true
          npm view @jilimb0/tgwrapper-adapter-redis --json || true
          npm view @jilimb0/tgwrapper-observability --json || true
      - name: Pack artifact check
        run: |
          set -euo pipefail
          for d in "." "packages/adapter-redis" "packages/observability"; do
            echo "Checking pack contents in ${d}"
            (cd "${d}" && npm pack --dry-run --json > /tmp/pack.json)
            node -e "const fs=require('fs');const pack=JSON.parse(fs.readFileSync('/tmp/pack.json','utf8'))[0];const files=new Set(pack.files.map(f=>f.path));const pkg=JSON.parse(fs.readFileSync('${d}/package.json','utf8'));const required=['package.json'];if('${d}'==='.') required.push('dist/index.js','dist/index.d.ts'); else required.push('dist/index.js','dist/index.d.ts');for(const f of required){if(!files.has(f)){console.error('Missing packed file',f,'for',pkg.name);process.exit(1);}}console.log('Pack OK',pkg.name,pkg.version,'files=',pack.files.length);"
          done
      - run: |
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL}"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          echo "OIDC context is available"
      - name: OIDC debug claims
        run: |
          set -euo pipefail
          RAW="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"
          JWT="$(echo "${RAW}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>process.stdout.write(JSON.parse(s).value))")"
          echo "GitHub context"
          echo "  repository=${GITHUB_REPOSITORY}"
          echo "  ref=${GITHUB_REF}"
          echo "  workflow=${GITHUB_WORKFLOW}"
          echo "  workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "OIDC payload"
          echo "${JWT}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const token=s.trim();const parts=token.split('.');if(parts.length<2){throw new Error('Invalid JWT');}const payload=JSON.parse(Buffer.from(parts[1],'base64url').toString('utf8'));const out={iss:payload.iss,aud:payload.aud,sub:payload.sub,repository:payload.repository,repository_owner:payload.repository_owner,ref:payload.ref,job_workflow_ref:payload.job_workflow_ref,workflow_ref:payload.workflow_ref,actor:payload.actor};console.log(JSON.stringify(out,null,2));})"
      - name: Assert supported npm publish mode
        run: |
          set -euo pipefail
          if [ "${NPM_PUBLISH_PROVENANCE}" = "true" ]; then
            echo "Unsupported publish configuration for current repository visibility:"
            echo "NPM_PUBLISH_PROVENANCE=true with private GitHub repository."
            echo "Set NPM_PUBLISH_PROVENANCE=false (current supported mode) or migrate repository/package settings to supported public provenance flow."
            exit 1
          fi
          echo "Publish mode OK: private repository without provenance."
      - name: OIDC publish preflight (dry-run)
        id: oidc_preflight
        continue-on-error: true
        env:
          CHANGESETS_RELEASE: "1"
        run: |
          set -euo pipefail
          # Core package is already published and unchanged; preflight only unpublished subpackages.
          for d in "packages/adapter-redis" "packages/observability"; do
            NAME="$(node -e "console.log(require('./${d}/package.json').name)")"
            VERSION="$(node -e "console.log(require('./${d}/package.json').version)")"
            if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skipping preflight for already published ${NAME}@${VERSION}"
              continue
            fi

            echo "OIDC dry-run publish in ${d} for ${NAME}@${VERSION}"
            (cd "${d}" && npm publish --access public --dry-run)
          done
      - name: Fail if OIDC preflight failed
        if: steps.oidc_preflight.outcome == 'failure'
        run: |
          echo "OIDC preflight failed. Check previous step logs for package-specific error details."
          exit 1
      - name: Drop token auth to force OIDC trusted publishing
        run: |
          set -euo pipefail
          rm -f "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}" || true
          rm -f "$HOME/.npmrc" || true
      - uses: changesets/action@v1
        with:
          publish: pnpm -r publish --access public --no-git-checks
          version: pnpm changeset version
        env:
          CHANGESETS_RELEASE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""

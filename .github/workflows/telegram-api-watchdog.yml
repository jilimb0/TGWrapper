name: Telegram API Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  baseline-watchdog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check Telegram API changelog drift
        run: pnpm telegram:baseline:latest

name: Telegram API Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: telegram-api-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Refresh telegram schema snapshot
        run: pnpm telegram:schema:fetch:ci
      - name: Detect drift
        id: drift
        continue-on-error: true
        run: |
          set -euo pipefail
          pnpm telegram:schema:drift:check > drift.log 2>&1
      - name: Compose issue body
        if: steps.drift.outcome == 'failure'
        id: body
        run: |
          {
            echo 'body<<EOF'
            echo '## Telegram API Drift detected'
            echo ''
            echo 'The scheduled drift check found differences between the stored snapshot and the latest fetched Telegram Bot API schema.'
            echo ''
            echo '### Failure log'
            echo '```text'
            tail -n 200 drift.log
            echo '```'
            echo ''
            echo '### Next steps'
            echo '1. Review the diff in the workflow artifacts.'
            echo '2. Regenerate snapshots/schema-derived outputs if the upstream change is expected.'
            echo '3. Update docs/tests and close this issue once handled.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Create issue
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = 'Telegram API drift detected';
            const body = process.env.ISSUE_BODY;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'telegram-api-drift',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              core.info(`Drift issue already open: #${existing.number}`);
              return;
            }
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['telegram-api-drift'],
            });
        env:
          ISSUE_BODY: ${{ steps.body.outputs.body }}
      - name: Upload drift log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: telegram-api-watchdog
          path: |
            drift.log
            scripts/telegram-api-snapshot.json
          if-no-files-found: ignore

name: Go No-Go

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: go-no-go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gates:
    runs-on: ubuntu-latest
    env:
      NPM_PUBLISH_PROVENANCE: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Upgrade npm for trusted publishing parity
        run: |
          npm i -g npm@11.8.0
          npm -v
      - run: pnpm install --frozen-lockfile
      - name: Release gates
        id: run_release_gates
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          (
            if [ "${NPM_PUBLISH_PROVENANCE}" = "true" ]; then
              echo "Unsupported publish mode for private repository: provenance=true."
              echo "Use NPM_PUBLISH_PROVENANCE=false or migrate to supported public provenance flow."
              exit 1
            fi
            pnpm verify:release
            CHANGESETS_RELEASE="1" pnpm -r publish --dry-run --no-git-checks
          ) > .artifacts/error.log 2>&1
      - name: Write failure digest
        if: steps.run_release_gates.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### release-gates"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v7
        if: steps.run_release_gates.outcome == 'failure'
        with:
          name: go-no-go-release-gates
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_release_gates.outcome == 'failure'
        run: exit 1

  reliability-gates:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Reliability gates
        id: run_reliability_gates
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          (
            for run in 1 2 3; do
              echo "Go/No-Go reliability repetition #${run}: load"
              pnpm test:load
              echo "Go/No-Go reliability repetition #${run}: chaos"
              pnpm test:chaos
            done
            pnpm test:integration
          ) > .artifacts/error.log 2>&1
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - name: Write failure digest
        if: steps.run_reliability_gates.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### reliability-gates"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v7
        if: steps.run_reliability_gates.outcome == 'failure'
        with:
          name: go-no-go-reliability-gates
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_reliability_gates.outcome == 'failure'
        run: exit 1

  go-no-go-summary:
    runs-on: ubuntu-latest
    needs:
      - release-gates
      - reliability-gates
    if: always()
    steps:
      - name: Download failure digests
        uses: actions/download-artifact@v8
        if: always()
        continue-on-error: true
        with:
          path: .artifacts-upload
          pattern: go-no-go-*
      - name: Publish decision
        run: |
          set -euo pipefail
          RELEASE_GATES_RESULT="${{ needs.release-gates.result }}"
          RELIABILITY_GATES_RESULT="${{ needs.reliability-gates.result }}"

          if [ "${RELEASE_GATES_RESULT}" = "success" ] && [ "${RELIABILITY_GATES_RESULT}" = "success" ]; then
            DECISION="GO"
            MESSAGE="All release gates passed."
          else
            DECISION="NO-GO"
            MESSAGE="One or more release gates failed. Do not tag/publish."
          fi

          {
            echo "## Go/No-Go Decision"
            echo ""
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| release-gates | ${RELEASE_GATES_RESULT} |"
            echo "| reliability-gates | ${RELIABILITY_GATES_RESULT} |"
            echo ""
            echo "## Failure details"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          FOUND=0
          if [ -d .artifacts-upload ]; then
            # Safe loop without process substitution
            for file in $(find .artifacts-upload -name 'failure-summary.md' | sort); do
              if [ -f "$file" ]; then
                FOUND=1
                cat "$file" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          fi

          if [ "$FOUND" -eq 0 ]; then
            {
              echo "No failure digests were collected."
              echo ""
              echo "A gate failed before its digest was uploaded, or no digest artifact matched the download pattern."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo "**Decision: ${DECISION}**"
            echo ""
            echo "${MESSAGE}"
          } >> "$GITHUB_STEP_SUMMARY"

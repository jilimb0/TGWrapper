name: 1.0 Readiness

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-1-0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:1.0
      - run: pnpm -r publish --dry-run --no-git-checks
        env:
          CHANGESETS_RELEASE: "1"

  reliability:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Repeat load + chaos
        run: |
          set -euo pipefail
          for run in 1 2 3; do
            echo "1.0 readiness repetition #${run}: load"
            pnpm test:load
            echo "1.0 readiness repetition #${run}: chaos"
            pnpm test:chaos
          done
      - run: pnpm test:integration
        env:
          REDIS_URL: redis://127.0.0.1:6379

name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changeset-required:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          # Use --no-frozen-lockfile when lockfile is genuinely out of sync with
          # package.json (e.g. Version Packages commits that bump specifiers).
          # --frozen-lockfile is used everywhere else to catch accidental drift.
          if pnpm install --frozen-lockfile 2>&1 | grep -q 'ERR_PNPM_OUTDATED_LOCKFILE'; then
            echo "Lockfile outdated (Version Packages commit) — regenerating."
            pnpm install --no-frozen-lockfile
          fi
      - name: Check changeset requirement
        id: run_check
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          node scripts/check-changeset-required.mjs > .artifacts/error.log 2>&1
      - name: Write failure digest
        if: steps.run_check.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### changeset-required"
            echo ""
            echo '```text'
            tail -n 80 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v4
        if: steps.run_check.outcome == 'failure'
        with:
          name: ci-changeset-required
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_check.outcome == 'failure'
        run: exit 1

  verify:
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: |
          if pnpm install --frozen-lockfile 2>&1 | grep -q 'ERR_PNPM_OUTDATED_LOCKFILE'; then
            echo "Lockfile outdated (Version Packages commit) — regenerating."
            pnpm install --no-frozen-lockfile
          fi
      - name: Verify toolchain
        id: run_verify
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          (
            pnpm typecheck:compat &&
            pnpm typecheck &&
            pnpm build &&
            pnpm test
          ) > .artifacts/error.log 2>&1
      - name: Write failure digest
        if: steps.run_verify.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### verify (node ${{ matrix.node-version }})"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v4
        if: steps.run_verify.outcome == 'failure'
        with:
          name: ci-verify-node-${{ matrix.node-version }}
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_verify.outcome == 'failure'
        run: exit 1

  release-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          if pnpm install --frozen-lockfile 2>&1 | grep -q 'ERR_PNPM_OUTDATED_LOCKFILE'; then
            echo "Lockfile outdated (Version Packages commit) — regenerating."
            pnpm install --no-frozen-lockfile
          fi
      - name: Release integrity checks
        id: run_release_integrity
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          (
            pnpm telegram:baseline:check &&
            pnpm telegram:schema:fetch:ci &&
            pnpm telegram:schema:completeness:check &&
            pnpm telegram:schema:drift:check &&
            pnpm api:snapshot:check &&
            pnpm pack:size &&
            pnpm -r build
          ) > .artifacts/error.log 2>&1
      - name: Write failure digest
        if: steps.run_release_integrity.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### release-integrity"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v4
        if: steps.run_release_integrity.outcome == 'failure'
        with:
          name: ci-release-integrity
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_release_integrity.outcome == 'failure'
        run: exit 1

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          if pnpm install --frozen-lockfile 2>&1 | grep -q 'ERR_PNPM_OUTDATED_LOCKFILE'; then
            echo "Lockfile outdated (Version Packages commit) — regenerating."
            pnpm install --no-frozen-lockfile
          fi
      - name: Redis integration tests
        id: run_redis_integration
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          pnpm --filter @jilimb0/tgwrapper-adapter-redis test:integration > .artifacts/error.log 2>&1
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - name: Write failure digest
        if: steps.run_redis_integration.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### redis-integration"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v4
        if: steps.run_redis_integration.outcome == 'failure'
        with:
          name: ci-redis-integration
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_redis_integration.outcome == 'failure'
        run: exit 1

  summary:
    runs-on: ubuntu-latest
    needs:
      - changeset-required
      - verify
      - release-integrity
      - redis-integration
    if: always()
    steps:
      - name: Download failure digests
        uses: actions/download-artifact@v4
        if: always()
        continue-on-error: true
        with:
          path: .artifacts-upload
          pattern: ci-*
      - name: CI summary
        run: |
          set -euo pipefail

          CHANGESET_RESULT="${{ needs.changeset-required.result }}"
          VERIFY_RESULT="${{ needs.verify.result }}"
          RELEASE_RESULT="${{ needs.release-integrity.result }}"
          REDIS_RESULT="${{ needs.redis-integration.result }}"

          {
            echo "## CI Summary"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| changeset-required | ${CHANGESET_RESULT} |"
            echo "| verify | ${VERIFY_RESULT} |"
            echo "| release-integrity | ${RELEASE_RESULT} |"
            echo "| redis-integration | ${REDIS_RESULT} |"
            echo ""
            echo "## Failure details"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          FOUND=0
          if [ -d .artifacts-upload ]; then
            for file in $(find .artifacts-upload -name 'failure-summary.md' | sort); do
              if [ -f "$file" ]; then
                FOUND=1
                cat "$file" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          fi

          if [ "$FOUND" -eq 0 ]; then
            {
              echo "No failure digests were collected."
              echo ""
              echo "A gate failed before its digest was uploaded, or no digest artifact matched the download pattern."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "CI Summary write completed."

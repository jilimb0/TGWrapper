name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changeset-required:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-install
      - name: Check changeset requirement
        id: run_check
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          node scripts/check-changeset-required.mjs > .artifacts/error.log 2>&1
      - name: Write failure digest
        if: steps.run_check.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### changeset-required"
            echo ""
            echo '```text'
            tail -n 80 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v7
        if: steps.run_check.outcome == 'failure'
        with:
          name: ci-changeset-required
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_check.outcome == 'failure'
        run: exit 1

  verify:
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/pnpm-install
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify toolchain
        id: run_verify
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          (
            pnpm typecheck:compat &&
            pnpm typecheck &&
            pnpm build &&
            pnpm test
          ) > .artifacts/error.log 2>&1
      - name: Write failure digest
        if: steps.run_verify.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### verify (node ${{ matrix.node-version }})"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v7
        if: steps.run_verify.outcome == 'failure'
        with:
          name: ci-verify-node-${{ matrix.node-version }}
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_verify.outcome == 'failure'
        run: exit 1

  release-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/pnpm-install
      - name: Release integrity checks
        id: run_release_integrity
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          (
            pnpm telegram:baseline:check &&
            pnpm telegram:schema:fetch:ci &&
            pnpm telegram:schema:completeness:check &&
            pnpm telegram:schema:drift:check &&
            pnpm api:snapshot:check &&
            pnpm pack:size
          ) > .artifacts/error.log 2>&1
      - name: Write failure digest
        if: steps.run_release_integrity.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          {
            echo "### release-integrity"
            echo ""
            echo '```text'
            tail -n 120 .artifacts/error.log
            echo '```'
          } > .artifacts/failure-summary.md
      - uses: actions/upload-artifact@v7
        if: steps.run_release_integrity.outcome == 'failure'
        with:
          name: ci-release-integrity
          path: .artifacts/failure-summary.md
          if-no-files-found: error
      - name: Fail job if gate failed
        if: steps.run_release_integrity.outcome == 'failure'
        run: exit 1

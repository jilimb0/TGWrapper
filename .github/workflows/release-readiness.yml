name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Readiness mode"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - one-zero
      include_reliability:
        description: "Run repeated load/chaos + redis integration gates"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Release verification
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          rm -f .artifacts/failure-summary.md .artifacts/error.log || true
          if ! pnpm verify:release > .artifacts/error.log 2>&1; then
            {
              echo "### verify"
              echo ""
              echo '```text'
              tail -n 120 .artifacts/error.log
              echo '```'
            } | tee .artifacts/failure-summary.md >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
      - name: npm publish dry-run (no git checks)
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          rm -f .artifacts/failure-summary.md .artifacts/error.log || true
          if ! pnpm -r publish --dry-run --no-git-checks >> .artifacts/error.log 2>&1; then
            {
              echo "### verify"
              echo ""
              echo '```text'
              tail -n 120 .artifacts/error.log
              echo '```'
            } | tee .artifacts/failure-summary.md >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
        env:
          CHANGESETS_RELEASE: "1"
      - name: Persist failure digest artifact
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          if [ ! -f .artifacts/failure-summary.md ]; then
            {
              echo "### failure-digest-fallback"
              echo ""
              echo "The job failed before a dedicated failure summary was written."
              echo ""
              echo '```text'
              if [ -f .artifacts/error.log ]; then
                tail -n 120 .artifacts/error.log
              else
                echo "No .artifacts/error.log file was found."
              fi
              echo '```'
            } | tee .artifacts/failure-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-readiness-verify
          path: .artifacts
          if-no-files-found: ignore

  reliability:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_reliability == 'true' }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Repeat load and chaos checks
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          rm -f .artifacts/failure-summary.md .artifacts/error.log || true
          if ! (
            for run in 1 2 3; do
              echo "Release-readiness reliability repetition #${run}: load"
              pnpm test:load
              echo "Release-readiness reliability repetition #${run}: chaos"
              pnpm test:chaos
            done
            pnpm test:integration
          ) > .artifacts/error.log 2>&1; then
            {
              echo "### reliability"
              echo ""
              echo '```text'
              tail -n 120 .artifacts/error.log
              echo '```'
            } | tee .artifacts/failure-summary.md >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
        env:
          REDIS_URL: redis://127.0.0.1:6379
      - name: Persist failure digest artifact
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          if [ ! -f .artifacts/failure-summary.md ]; then
            {
              echo "### failure-digest-fallback"
              echo ""
              echo "The job failed before a dedicated failure summary was written."
              echo ""
              echo '```text'
              if [ -f .artifacts/error.log ]; then
                tail -n 120 .artifacts/error.log
              else
                echo "No .artifacts/error.log file was found."
              fi
              echo '```'
            } | tee .artifacts/failure-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-readiness-reliability
          path: .artifacts
          if-no-files-found: ignore

  summary:
    runs-on: ubuntu-latest
    needs:
      - verify
      - reliability
    if: always()
    steps:
      - name: Prepare artifact download directory
        if: always()
        run: rm -rf .artifacts-upload && mkdir -p .artifacts-upload
      - uses: actions/download-artifact@v6
        if: always()
        continue-on-error: true
        with:
          path: .artifacts-upload
          pattern: release-readiness-*
          merge-multiple: true
      - name: Readiness summary
        run: |
          set -euo pipefail
          VERIFY_RESULT="${{ needs.verify.result }}"
          RELIABILITY_RESULT="${{ needs.reliability.result }}"
          if [ "${RELIABILITY_RESULT}" = "skipped" ] || [ -z "${RELIABILITY_RESULT}" ]; then
            RELIABILITY_RESULT="not_requested"
          fi

          if [ "${VERIFY_RESULT}" = "success" ] && { [ "${RELIABILITY_RESULT}" = "success" ] || [ "${RELIABILITY_RESULT}" = "not_requested" ]; }; then
            DECISION="GO"
          else
            DECISION="NO-GO"
          fi

          {
            echo "## Release Readiness Summary"
            echo ""
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| verify + dry-run publish | ${VERIFY_RESULT} |"
            echo "| optional reliability gates | ${RELIABILITY_RESULT} |"
            echo ""
            echo "## Failure digest"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -d .artifacts-upload ]; then
            {
              echo "### Downloaded artifact files"
              echo ""
              echo '```text'
              find .artifacts-upload -maxdepth 3 -type f | sort
              echo '```'
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Artifact download status"
              echo ""
              echo "Artifact download directory was not created."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if find .artifacts-upload -name 'failure-summary.md' -print -quit >/dev/null 2>&1; then
            while IFS= read -r file; do
              cat "$file" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            done < <(find .artifacts-upload -name 'failure-summary.md' | sort)
          else
            {
              echo "No failure digests were produced."
              echo ""
              echo "This usually means either the failing job did not create .artifacts/failure-summary.md or download-artifact did not materialize the uploaded files as expected."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "**Decision: ${DECISION}**"
            echo ""
            echo "If decision is GO, baseline release gates are satisfied."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${DECISION}" = "NO-GO" ]; then
            exit 1
          fi

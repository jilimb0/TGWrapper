packages:
  - '.'
  - 'packages/*'
  - 'examples/*'

overrides:
  vite: 8.0.16

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@tgwrapper/core'
  - '@tgwrapper/adapter-redis'
  - '@tgwrapper/observability'
  - '@tgwrapper/starter-migration'
  - '@tgwrapper/starter-standard-bot'
  - '@tgwrapper/starter-support-bot'
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  serverless: true
  sharp: true
  workerd: true

name: baseline-followup-guard

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/telegram-api-baseline.yml'
      - 'scripts/check-baseline-followup.mjs'
      - '.github/workflows/baseline-followup-guard.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - name: Check baseline follow-up issue freshness
        run: node scripts/check-baseline-followup.mjs --check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

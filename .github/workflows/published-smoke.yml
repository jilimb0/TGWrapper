name: Published Smoke

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  actions: read

concurrency:
  group: published-smoke-${{ github.event_name }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  check-published:
    # Only relevant for workflow_run triggers; workflow_dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository) }}
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.flag.outputs.should_run }}
    steps:
      - name: Download publish flag
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: publish-flag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: .publish-flag
        continue-on-error: true

      - name: Read flag
        id: flag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch: forcing smoke run"
          elif [ -f .publish-flag/flag.txt ]; then
            VAL="$(cat .publish-flag/flag.txt | grep -oP 'published=\K.*')"
            echo "should_run=${VAL}" >> "$GITHUB_OUTPUT"
            echo "publish flag: ${VAL}"
          else
            # Artifact missing (e.g. release failed before writing it) — skip.
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "publish flag artifact not found, skipping smoke"
          fi

  published-smoke:
    needs: check-published
    if: needs.check-published.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - uses: pnpm/action-setup@v6
      - name: Run published smoke
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          rm -f .artifacts/failure-summary.md .artifacts/error.log || true
          pnpm dlx wait-on@8.0.1 --timeout 300000 \
            "https://registry.npmjs.org/@tgwrapper/core" \
            "https://registry.npmjs.org/@tgwrapper/adapter-redis" \
            "https://registry.npmjs.org/@tgwrapper/observability" \
            "https://registry.npmjs.org/@tgwrapper/starter-migration" \
            "https://registry.npmjs.org/@tgwrapper/starter-standard-bot" \
            "https://registry.npmjs.org/@tgwrapper/starter-support-bot" \
            "https://registry.npmjs.org/@tgwrapper/create"
          if ! node scripts/published-smoke.mjs 2>&1 | tee .artifacts/published-smoke.log; then
            {
              echo "### published-smoke"
              echo ""
              echo '```text'
              tail -n 120 .artifacts/published-smoke.log
              echo '```'
            } > .artifacts/failure-summary.md
            exit 1
          fi
        env:
          PUBLISHED_SMOKE_STRICT: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      - name: Published smoke summary
        if: always()
        run: |
          {
            echo "## Published Smoke Summary"
            echo ""
            echo "Strict mode: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}"
            echo ""
            echo "## Failure digest"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f .artifacts/failure-summary.md ]; then
            cat .artifacts/failure-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No failure digest was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "Published package smoke validation completed."
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always() && hashFiles('.artifacts/**') != ''
        with:
          name: published-smoke-log
          path: .artifacts
          if-no-files-found: ignore

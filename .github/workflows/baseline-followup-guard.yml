name: Baseline Follow-up Guard

on:
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run baseline follow-up check
        id: followup_check
        continue-on-error: true
        run: node scripts/check-baseline-followup.mjs origin/${{ github.base_ref }}
      - name: Ensure needs-follow-up label exists
        if: steps.followup_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: 'needs-follow-up',
                color: 'd93f0b',
                description: 'Baseline changed without required compatibility follow-up'
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
      - name: Label PR as needs-follow-up
        if: steps.followup_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: context.issue.number,
              labels: ['needs-follow-up']
            });
      - name: Fail guard when follow-up is missing
        if: steps.followup_check.outcome == 'failure'
        run: |
          echo "Baseline was changed without required compatibility follow-up. See check output."
          exit 1

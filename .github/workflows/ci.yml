name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm telegram:baseline:check
      - run: pnpm telegram:schema:fetch:ci
      - name: Telegram schema completeness check (informational)
        continue-on-error: true
        run: pnpm telegram:schema:completeness:check
      - name: Telegram schema drift check (informational)
        continue-on-error: true
        run: pnpm telegram:schema:drift:check
      - run: pnpm typecheck:compat
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm api:snapshot:check
      - run: pnpm pack:size
      - run: pnpm -r build
      - run: pnpm test

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @jilimb0/tgwrapper-adapter-redis test:integration
        env:
          REDIS_URL: redis://127.0.0.1:6379
